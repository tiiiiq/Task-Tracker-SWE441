<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متتبع المهام </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>متتبع المهام </h1>
            <p>نظم وقتك، ضاعف إنجازك</p>
        </header>

        <section class="input-section">
            <div class="input-group">
                <input type="text" id="taskName" placeholder="ماذا تريد أن تنجز؟" autocomplete="off">
            </div>
            
            <div class="datetime-group">
                <div class="input-box">
                    <label>التاريخ (لـ 3 أيام القادمة):</label>
                    <input type="date" id="taskDate">
                </div>
                <div class="input-box">
                    <label>من الساعة:</label>
                    <input type="time" id="startTime">
                </div>
                <div class="input-box">
                    <label>إلى الساعة:</label>
                    <input type="time" id="endTime">
                </div>
            </div>

            <button id="addBtn" onclick="addTask()">إضافة المهمة ➕</button>
        </section>

        <div class="boards-container">
            <div class="board active-board">
                <h2>📌 المهام الحالية</h2>
                <ul id="activeTasks" class="task-list"></ul>
            </div>

            <div class="board completed-board">
                <h2>🏆 سجل الإنجازات</h2>
                <ul id="completedTasks" class="task-list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
